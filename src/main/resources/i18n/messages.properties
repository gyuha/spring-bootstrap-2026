# ================================================================================
# messages.properties — 기본 메시지 fallback (한국어)
# Accept-Language 헤더가 없거나 지원하지 않는 언어일 때 사용
# ================================================================================

# ── 공통 성공 메시지 ──────────────────────────────────────────────────────────
success.ok=요청이 성공적으로 처리되었습니다.
success.created=리소스가 성공적으로 생성되었습니다.
success.deleted=리소스가 성공적으로 삭제되었습니다.

# ── 공통 에러 메시지 (HTTP 수준 — 보안 필터 및 프레임워크 레벨) ──────────────
error.unauthorized=인증이 필요합니다. 로그인 후 이용해 주세요.
error.forbidden=해당 리소스에 접근할 권한이 없습니다.
error.notFound=요청한 리소스를 찾을 수 없습니다.
error.methodNotAllowed=지원하지 않는 HTTP 메서드입니다.
error.conflict=이미 존재하는 리소스입니다.
error.validation=입력값 유효성 검증에 실패했습니다.
error.badRequest=잘못된 요청입니다.
error.internalServer=서버 내부 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.
error.serviceUnavailable=서비스를 일시적으로 사용할 수 없습니다. 잠시 후 다시 시도해 주세요.

# ── Auth 도메인 ──────────────────────────────────────────────────────────────
AUTH_001=인증 토큰이 없거나 잘못된 형식입니다.
AUTH_002=만료된 토큰입니다. 다시 로그인해 주세요.
AUTH_003=블랙리스트에 등록된 토큰입니다. 다시 로그인해 주세요.
AUTH_004=이메일 또는 비밀번호가 올바르지 않습니다.
AUTH_005=이미 사용된 Refresh Token입니다. 보안을 위해 다시 로그인해 주세요.
AUTH_006=지원하지 않는 OAuth2 공급자입니다.

# ── Account 도메인 ───────────────────────────────────────────────────────────
ACCOUNT_001=이미 사용 중인 이메일입니다.
ACCOUNT_002=존재하지 않는 계정입니다.
ACCOUNT_003=해당 리소스에 접근할 권한이 없습니다.
ACCOUNT_004=비밀번호를 변경할 수 없는 계정입니다. (OAuth2 전용 계정)

# ── AI 도메인 ────────────────────────────────────────────────────────────────
AI_001=AI 서비스에서 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.
AI_002=AI 요청 처리 중 오류가 발생했습니다.
AI_003=AI 모델 응답 시간이 초과되었습니다.

# ── Batch 도메인 ─────────────────────────────────────────────────────────────
BATCH_001=배치 작업을 실행할 권한이 없습니다.
BATCH_002=배치 작업 실행 중 오류가 발생했습니다.
BATCH_003=이미 실행 중인 배치 작업이 있습니다.

# ── 공통 도메인 에러 ─────────────────────────────────────────────────────────
COMMON_001=입력값이 유효하지 않습니다.
COMMON_002=서버 내부 오류가 발생했습니다.
COMMON_003=요청한 리소스를 찾을 수 없습니다.
COMMON_004=잘못된 요청 형식입니다.
COMMON_005=지원하지 않는 미디어 타입입니다.
