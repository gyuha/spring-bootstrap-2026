# ── Common Success Messages ───────────────────────────────────────────────────
success.ok=Request processed successfully.
success.created=Resource created successfully.
success.deleted=Resource deleted successfully.

# ── Common Error Messages (HTTP level — security filter & framework level) ────
error.unauthorized=Authentication required. Please log in.
error.forbidden=You do not have permission to access this resource.
error.notFound=The requested resource could not be found.
error.methodNotAllowed=HTTP method not supported.
error.conflict=Resource already exists.
error.validation=Input validation failed.
error.badRequest=Invalid request.
error.internalServer=An internal server error occurred. Please try again later.
error.serviceUnavailable=Service temporarily unavailable. Please try again later.

