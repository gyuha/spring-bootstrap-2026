# =============================================================================
# Docker Compose — spring-bootstrap 전체 스택
#
# 포함 서비스:
#   postgres   : PostgreSQL 16 (R2DBC + JDBC + Flyway 공용)
#   redis      : Redis 7 (JWT 블랙리스트 + 캐싱)
#   app        : Spring Boot 애플리케이션 (local 프로파일)
#   prometheus : Prometheus (메트릭 수집)
#   grafana    : Grafana (대시보드 시각화)
#
# 실행:
#   docker compose up -d
#
# 종료:
#   docker compose down -v   # 볼륨까지 삭제
# =============================================================================

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bootstrap-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bootstrap}
      POSTGRES_USER: ${POSTGRES_USER:-bootstrap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bootstrap}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bootstrap} -d ${POSTGRES_DB:-bootstrap}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - bootstrap-net

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bootstrap-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - bootstrap-net

  # ── Application ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bootstrap-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      # PostgreSQL — R2DBC
      R2DBC_URL: r2dbc:postgresql://postgres:5432/${POSTGRES_DB:-bootstrap}
      # PostgreSQL — JDBC (Flyway + Spring Batch)
      JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bootstrap}
      DB_USERNAME: ${POSTGRES_USER:-bootstrap}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-bootstrap}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # JWT
      JWT_SECRET: ${JWT_SECRET:-bootstrap-secret-key-change-in-production-must-be-32-chars}
      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY:-placeholder-key}
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bootstrap-net

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: bootstrap-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - bootstrap-net

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: bootstrap-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - bootstrap-net

# ── Named Volumes ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  bootstrap-net:
    driver: bridge
