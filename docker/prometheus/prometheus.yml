# =============================================================================
# Prometheus 설정 — spring-bootstrap 메트릭 수집
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Spring Boot Actuator /actuator/prometheus 엔드포인트
  - job_name: "spring-bootstrap"
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ["app:8080"]
        labels:
          application: "spring-bootstrap"
          environment: "local"

  # Prometheus 자체 메트릭
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
